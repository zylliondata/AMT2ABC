<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AMT 图谱报告</title>
<style>
:root{--bg:#0d1117;--card:#161b22;--border:#30363d;--text:#c9d1d9;--text2:#8b949e;--accent:#58a6ff;--green:#3fb950;--orange:#d29922;--red:#f85149;--purple:#bc8cff;--cyan:#39d2c0;--font:system-ui,-apple-system,sans-serif;--mono:'Cascadia Code','Fira Code',monospace}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:var(--font);line-height:1.6;overflow:hidden;height:100vh}
.app{display:flex;height:100vh}
.sidebar{width:280px;background:var(--card);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
.sidebar-header{padding:20px;border-bottom:1px solid var(--border)}
.sidebar-header h1{font-size:16px;color:var(--accent);margin-bottom:4px}
.sidebar-header p{font-size:11px;color:var(--text2)}
.nav{flex:1;overflow-y:auto;padding:8px 0}
.nav-item{display:flex;align-items:center;gap:10px;padding:8px 20px;cursor:pointer;font-size:13px;color:var(--text2);transition:all .15s}
.nav-item:hover{background:rgba(88,166,255,.08);color:var(--text)}
.nav-item.active{background:rgba(88,166,255,.12);color:var(--accent);border-right:2px solid var(--accent)}
.nav-item .icon{width:18px;text-align:center;font-size:14px}
.nav-section{padding:12px 20px 4px;font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;font-weight:600}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{height:48px;border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;gap:16px;flex-shrink:0}
.topbar .breadcrumb{font-size:13px;color:var(--text2)}
.topbar .breadcrumb span{color:var(--text)}
.topbar .actions{margin-left:auto;display:flex;gap:8px}
.btn{padding:6px 14px;border-radius:6px;border:1px solid var(--border);background:var(--card);color:var(--text);font-size:12px;cursor:pointer;display:flex;align-items:center;gap:6px;transition:all .15s}
.btn:hover{border-color:var(--accent);color:var(--accent)}
.btn.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn.primary:hover{opacity:.9}
.content{flex:1;overflow-y:auto;padding:32px 40px}
.report{max-width:900px}
.report h1{font-size:28px;color:#fff;margin-bottom:8px;border-bottom:1px solid var(--border);padding-bottom:12px}
.report h2{font-size:20px;color:#fff;margin:32px 0 16px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.report h3{font-size:16px;color:var(--accent);margin:24px 0 12px}
.report h4{font-size:14px;color:var(--cyan);margin:20px 0 8px}
.report p{margin:8px 0;color:var(--text)}
.report blockquote{border-left:3px solid var(--accent);padding:8px 16px;margin:8px 0;background:rgba(88,166,255,.05);color:var(--text2);font-size:13px}
.report strong{color:#fff}
.report hr{border:none;border-top:1px solid var(--border);margin:24px 0}
.report table{width:100%;border-collapse:collapse;margin:12px 0;font-size:13px}
.report th{text-align:left;padding:8px 12px;background:var(--card);border:1px solid var(--border);color:var(--accent);font-weight:600}
.report td{padding:8px 12px;border:1px solid var(--border)}
.report tr:hover td{background:rgba(88,166,255,.04)}
.report ul,.report ol{margin:8px 0 8px 24px}
.report li{margin:4px 0}
.report code{background:rgba(88,166,255,.1);padding:2px 6px;border-radius:4px;font-family:var(--mono);font-size:12px;color:var(--cyan)}
.report pre{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:16px;margin:12px 0;overflow-x:auto}
.report pre code{background:none;padding:0;color:var(--text);font-size:12px;line-height:1.8}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin:16px 0}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:16px;text-align:center}
.stat-card .value{font-size:28px;font-weight:700;color:var(--accent)}
.stat-card .label{font-size:11px;color:var(--text2);margin-top:4px}
.stat-card.green .value{color:var(--green)}
.stat-card.orange .value{color:var(--orange)}
.stat-card.purple .value{color:var(--purple)}
.stat-card.cyan .value{color:var(--cyan)}
.chart-container{display:flex;gap:16px;margin:16px 0;flex-wrap:wrap}
.chart-box{flex:1;min-width:280px;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:16px}
.chart-box h4{margin:0 0 12px;font-size:13px;color:var(--text)}
.bar-chart{display:flex;flex-direction:column;gap:6px}
.bar-row{display:flex;align-items:center;gap:8px;font-size:12px}
.bar-label{width:120px;text-align:right;color:var(--text2);flex-shrink:0}
.bar-track{flex:1;height:22px;background:rgba(255,255,255,.04);border-radius:4px;overflow:hidden;position:relative}
.bar-fill{height:100%;border-radius:4px;display:flex;align-items:center;padding-left:8px;font-size:11px;color:#fff;font-weight:600;transition:width .6s ease}
.bar-count{margin-left:8px;color:var(--text2);font-size:11px;white-space:nowrap}
/* Graph viz */
.graph-panel{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:var(--bg);z-index:100;flex-direction:column}
.graph-panel.open{display:flex}
.graph-header{height:48px;border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;gap:12px}
.graph-header h3{font-size:14px;color:var(--text)}
.graph-header .close-btn{margin-left:auto;cursor:pointer;color:var(--text2);font-size:18px;padding:4px 8px;border-radius:4px}
.graph-header .close-btn:hover{background:rgba(255,255,255,.1);color:var(--text)}
.graph-body{flex:1;overflow:hidden;position:relative}
.graph-svg{width:100%;height:100%}
.legend{position:absolute;top:12px;right:12px;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:12px;font-size:11px}
.legend-item{display:flex;align-items:center;gap:6px;margin:4px 0}
.legend-dot{width:10px;height:10px;border-radius:50%}
.tooltip{position:absolute;background:var(--card);border:1px solid var(--border);border-radius:6px;padding:10px 14px;font-size:12px;pointer-events:none;opacity:0;transition:opacity .15s;max-width:300px;z-index:10}
.tooltip.show{opacity:1}
.tooltip .tt-title{font-weight:600;color:var(--accent);margin-bottom:4px}
.tooltip .tt-body{color:var(--text2)}
.filter-bar{display:flex;gap:8px;padding:8px 24px;border-bottom:1px solid var(--border);background:var(--card)}
.filter-chip{padding:4px 12px;border-radius:16px;font-size:11px;cursor:pointer;border:1px solid var(--border);color:var(--text2);transition:all .15s}
.filter-chip:hover,.filter-chip.active{border-color:var(--accent);color:var(--accent);background:rgba(88,166,255,.1)}
</style>
</head>
<body>
<div class="app">
<aside class="sidebar">
<div class="sidebar-header">

const DESC_HTML=`
<h2>7. 自然语言描述</h2>
<h3>热力学</h3>
<ol>
<li><strong>傅里叶热传导</strong>：模具内部的热传递遵循傅里叶定律——热通量与温度梯度成正比。当熔融铝液浇入型腔时，热量从型腔表面（高温）向冷却水道（低温）流动，形成温度场分布。</li>
<li><strong>牛顿冷却定律</strong>：模具外表面的散热遵循牛顿冷却定律——散热速率与模具表面温度和环境温度之差成正比。</li>
<li><strong>凝固潜热</strong>：凝固过程中，铝液释放约389 kJ/kg的潜热，在凝固前沿形成热阻，延缓凝固进程。</li>
<li><strong>模具预热均匀性</strong>：开模前，模具需预热至220-280°C并保持温度均匀。不均匀预热会导致热应力，影响铸件质量和模具寿命。</li>
<li><strong>冷却水道效率</strong>：内部冷却水道通过强制对流带走热量。冷却效率取决于水流速、进口温度和水道设计。水道堵塞会显著降低效率。</li>
<li><strong>浇注温度与流动性</strong>：铝液粘度随温度升高呈指数下降。浇注温度（680-720°C）直接影响充填流动性。</li>
<li><strong>凝固收缩</strong>：凝固过程中体积收缩（线收缩率约1.2-1.5%）。最后凝固区因补缩不足形成缩孔缩松。</li>
<li><strong>热平衡</strong>：稳态条件下，热收入（铝液热量）等于热支出（冷却水+表面散热）。打破平衡会导致温度波动。</li>
<li><strong>热膨胀</strong>：模具和铸件随温度变化发生线性膨胀/收缩，影响模隙、尺寸精度和顶出性能。</li>
</ol>
<h3>力学</h3>
<ol start="10">
<li><strong>热应力与模具疲劳</strong>：反复冷热循环产生的交变热应力是模具疲劳裂纹和最终失效的根本原因。</li>
<li><strong>锁模力与飞边控制</strong>：合模力必须超过金属压力在投影面积上的作用力（F >= P*A）。通常为3000-5000 kN。</li>
<li><strong>压射压力与致密度</strong>：增压压力通过冲头传递到铝液，促进补缩和内部致密化。</li>
<li><strong>模具变形</strong>：高压下的弹性变形（d = FL³/(3EI)）影响铸件尺寸精度。</li>
<li><strong>残余应力</strong>：凝固后残留的热应力和机械应力之和——是铸件变形和开裂的内驱力。</li>
<li><strong>顶出力</strong>：克服摩擦和粘附力将铸件顶出所需的力。力不足会导致拉伤或粘模。</li>
</ol>
<h3>流体力学</h3>
<ol start="16">
<li><strong>压射充填</strong>：铝液在冲头推动下高速（2-6 m/s）充填型腔，遵循纳维-斯托克斯方程，流动状态为湍流。</li>
<li><strong>气体卷吸</strong>：高速湍流的铝液将型腔内残留气体卷入，形成气泡，凝固后成为气孔缺陷。</li>
<li><strong>排气设计</strong>：排气槽和真空系统将型腔气体排出。效率取决于排气面积和压差。</li>
<li><strong>内浇口设计</strong>：内浇口截面积决定铝液入射速度和流动模式，影响充填方式和缺陷分布。</li>
<li><strong>真空度与气孔率</strong>：型腔真空度越高，残留气体越少，气孔率越低。真空度通常控制在10-100 Pa。</li>
<li><strong>压射三段</strong>：慢速阶段排出压室气体，高速阶段快速充填型腔，增压阶段补缩和压实。时序控制是工艺优化的核心。</li>
<li><strong>脱模剂喷涂</strong>：喷涂量和均匀性影响铸件表面质量和脱模性能。</li>
</ol>
<h3>材料科学</h3>
<ol start="23">
<li><strong>缩孔形成</strong>：最后凝固区因补缩不足形成空洞（V = V0*β*(1-fs)）。</li>
<li><strong>微观组织-晶粒度</strong>：晶粒度由温度梯度G和凝固速率R决定。晶粒越细，力学性能越好。</li>
<li><strong>气体溶解度-氢含量</strong>：氢在铝液中的溶解度遵循西弗特定律。凝固时溶解度急剧下降导致氢析出和气孔。</li>
<li><strong>氧化皮-夹渣缺陷</strong>：表面氧化膜（Al₂O₃）卷入形成夹渣缺陷。氧化速率随温度呈指数增长。</li>
<li><strong>合金成分与性能</strong>：抗拉强度是Si、Cu、Mg、Fe含量和冷加工硬化率的多元函数。</li>
<li><strong>模具磨损</strong>：型腔表面在高温高压铝液反复冲刷下磨损，影响表面质量和尺寸精度。</li>
<li><strong>热裂纹-模具失效</strong>：反复热循环产生的疲劳裂纹遵循Coffin-Manson关系的裂纹扩展寿命。</li>
</ol>
`;

function closeGraph(){

function renderGraph(filter){
const svg=document.getElementById('graphSvg');
const w=svg.clientWidth||1200,h=svg.clientHeight||700;
const nodes=[],edges=[];
const mechs=filter==='all'?MECHANISMS:MECHANISMS.filter(m=>m.cat===filter);
const entitySet=new Set();
mechs.forEach(m=>{entitySet.add(m.cause_entity);entitySet.add(m.effect_entity)});
const entities=[...entitySet];
const cx=w/2,cy=h/2;
const mechR=Math.min(w,h)*0.3;
const entR=mechR*0.6;
const eR=mechR*0.12;
mechs.forEach((m,i)=>{
const a=(i/mechs.length)*Math.PI*2-Math.PI/2;
nodes.push({x:cx+Math.cos(a)*mechR,y:cy+Math.sin(a)*mechR,r:8,color:CATS[m.cat].color,type:'mech',data:m,id:m.id});
});
const entAngles={};
entities.forEach((e,i)=>{
const linked=mechs.filter(m=>m.cause_entity===e||m.effect_entity===e);
const avgA=linked.reduce((s,m)=>{
const ni=nodes.findIndex(n=>n.id===m.id);
return s+(ni>=0?Math.atan2(nodes[ni].y-cy,nodes[ni].x-cx):0);
},0)/linked.length;
nodes.push({x:cx+Math.cos(avgA)*entR,y:cy+Math.sin(avgA)*entR,r:6,color:'#d29922',type:'entity',data:{name:e},id:'E_'+e});
});
mechs.forEach(m=>{
const mi=nodes.findIndex(n=>n.id===m.id);
const ci=nodes.findIndex(n=>n.id==='E_'+m.cause_entity);
const ei=nodes.findIndex(n=>n.id==='E_'+m.effect_entity);
if(ci>=0)edges.push({from:ci,to:mi,color:'#3fb950',type:'cause'});
if(ei>=0)edges.push({from:mi,to:ei,color:'#f85149',type:'effect'});
});
let html='';
edges.forEach(e=>{
const f=nodes[e.from],t=nodes[e.to];
html+=`<line x1="${f.x}" y1="${f.y}" x2="${t.x}" y2="${t.y}" stroke="${e.color}" stroke-width="1" stroke-opacity="0.4"/>`;
});
nodes.forEach(n=>{
html+=`<circle cx="${n.x}" cy="${n.y}" r="${n.r}" fill="${n.color}" stroke="#fff" stroke-width="1" stroke-opacity="0.3" style="cursor:pointer" data-id="${n.id}"/>`;
if(n.type==='mech'){
const tx=n.x+(n.x>cx?12:-12);
const ty=n.y;
const anchor=n.x>cx?'start':'end';
const label=n.data.name.split('-')[0];
html+=`<text x="${tx}" y="${ty+4}" fill="${n.color}" font-size="10" text-anchor="${anchor}" font-family="system-ui">${label}</text>`;
}
if(n.type==='entity'){
html+=`<text x="${n.x}" y="${n.y-10}" fill="#d29922" font-size="10" text-anchor="middle" font-family="system-ui">${n.data.name}</text>`;
}
});
svg.innerHTML=html;
svg.querySelectorAll('circle[data-id]').forEach(el=>{
el.addEventListener('mouseenter',e=>{
const id=el.dataset.id;
const n=nodes.find(x=>x.id===id);
if(!n)return;
const tt=document.getElementById('tooltip');
let content='';
if(n.type==='mech'){
const m=n.data;
content=`<div class="tt-title">${m.name}</div><div class="tt-body">
ID: ${m.id}<br>公式: <code>${m.formula}</code><br>
原因: ${m.cause}<br>结果: ${m.effect}<br>
引擎: ${m.engine}</div>`;
}else{
content=`<div class="tt-title">${n.data.name}</div><div class="tt-body">实体节点</div>`;
}
tt.innerHTML=content;
tt.style.left=(e.clientX+12)+'px';
tt.style.top=(e.clientY+12)+'px';
tt.classList.add('show');
});
el.addEventListener('mouseleave',()=>{
document.getElementById('tooltip').classList.remove('show');
});
});
}

el.classList.add('active');
renderGraph(el.dataset.filter);
});
